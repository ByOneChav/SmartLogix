<div class="container-fluid p-4">
    <h2 class="mb-4">Dashboard</h2>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <app-dashboard-card titulo="Inventario" valor="128" descripcion="Productos registrados" color="bg-primary"></app-dashboard-card>
        </div>
        <div class="col-md-4">
            <app-dashboard-card titulo="Pedidos" valor="45" descripcion="Pedidos activos" color="bg-success"></app-dashboard-card>
        </div>
        <div class="col-md-4">
            <app-dashboard-card titulo="Envíos" valor="32" descripcion="En tránsito" color="bg-warning"></app-dashboard-card>
        </div>
    </div>

    <app-dashboard-table titulo="Ultimos Pedidos" [columnas]="columnas" [datos]="pedidos"></app-dashboard-table>
</div>
