<mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" opened class="sidenav">
        <div class="sidenav-content">
            <div>
                <h3 class="p-3 fw-bold" style="color:#F4F7FF">SmartLogix</h3>
                <div class="px-3 pb-3" style="color:#FF2DAA;!important font-size: 0.95rem;;">
                    <i class="fa-regular fa-user">{{ usuario?.nombre || usuario?.email || 'Usuario'}}</i>
                    <br>
                    <small style="color:#6B7AB3">{{usuario?.rol}}</small>

                </div>
                <mat-nav-list>
                    <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
                    <a mat-list-item routerLink="/dashboard/inventario" routerLinkActive="active-link">Inventario</a>
                    <a mat-list-item routerLink="/dashboard/pedidos" routerLinkActive="active-link">Pedidos</a>
                    <a mat-list-item routerLink="/dashboard/envio" routerLinkActive="active-link">Envios</a>
                </mat-nav-list>
            </div>
            <div class="logout-container">
                <button mat-list-item (click)="logout()" class="logout-btn">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </mat-sidenav>


    <mat-sidenav-content class="content">
        <router-outlet></router-outlet>
    </mat-sidenav-content>
</mat-sidenav-container>
